name: Docker 构建并推送

# ─── 触发条件 ─────────────────────────────────────────────
# 推送 tag（如 v1.0.0、v2.3.1）时自动构建 Docker 镜像并推送到 GHCR
on:
  push:
    tags:
      - 'v*'            # 匹配 v1.0.0, v2.0.0-beta 等

env:
  REGISTRY: ghcr.io     # GitHub Container Registry

jobs:
  build-and-push:
    name: 构建镜像并推送
    runs-on: ubuntu-latest

    # GitHub Actions 需要 packages:write 权限来推送容器镜像
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ── 将 Git tag 写入 VERSION 文件 ───────────────────
      # Dockerfile 在构建时读取 VERSION 文件注入到：
      #   - 前端: VITE_REACT_APP_VERSION（显示在页面上）
      #   - 后端: common.Version（编译进二进制）
      - name: 写入版本号
        run: echo "${GITHUB_REF#refs/tags/}" > VERSION

      # ── 登录 GHCR ──────────────────────────────────────
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 生成镜像标签 ───────────────────────────────────
      # 自动生成多组标签：
      #   例如 tag=v1.2.3 →
      #     ghcr.io/owner/repo:v1.2.3  (完整版本)
      #     ghcr.io/owner/repo:1.2     (大版本.小版本)
      #     ghcr.io/owner/repo:1       (大版本)
      - name: 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # ── 构建并推送 ─────────────────────────────────────
      # 使用项目现有的 Dockerfile（多阶段构建）：
      #   阶段1: Bun 构建前端 default 主题 → web/default/dist/
      #   阶段2: Bun 构建前端 classic 主题 → web/classic/dist/
      #   阶段3: Go 编译后端（嵌入前端静态文件）→ new-api 二进制
      #   阶段4: 精简运行镜像（debian:bookworm-slim）
      #
      # ⚠️ 注意：postgres/redis 密码是运行时配置（docker-compose.yml），
      #    不需要在镜像构建阶段注入。
      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 启用 BuildKit 缓存，加快重复构建速度
          cache-from: type=gha
          cache-to: type=gha,mode=max
